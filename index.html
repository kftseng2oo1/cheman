<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>奇門遁甲 · 行動指引</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Ma+Shan+Zheng&display=swap');

:root {
  --bg:#09090f;--surface:#0f0f1a;--panel:#131320;--panel2:#17172a;
  --border:#222238;--border2:#2e2e50;
  --gold:#c8a84a;--gold2:#e8d080;--gold-dim:#7a6420;
  --red:#b83030;--teal:#18b090;--teal2:#25d4ac;
  --blue:#4a8cc8;--purple:#8870c8;
  --text:#e0d8c8;--text2:#a0987c;--muted:#505068;
  --yang:#d88040;--yin:#6090c0;
  --qi-clr:#e8b830;--yi-clr:#7aaccf;--kong-clr:#b03030;
  --ai-user:#141c2a;--ai-bot:#0d1520;
  /* 五行色 */
  --wood:#38b848;--fire:#e85030;--earth:#c89820;
  --metal:#90c0e0;--water:#3060e0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;
  background-image:radial-gradient(ellipse 70% 50% at 10% 5%,#141428 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 95%,#0a1520 0%,transparent 60%);}

/* ── Header ── */
header{text-align:center;padding:22px 16px 14px;border-bottom:1px solid var(--border);position:relative;}
.hd{position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
h1{font-family:'Ma Shan Zheng',serif;font-size:clamp(20px,5vw,34px);color:var(--gold);
  letter-spacing:.28em;text-shadow:0 0 30px rgba(200,168,74,.35),0 2px 4px rgba(0,0,0,.8);}
.hsub{font-size:11px;color:var(--muted);letter-spacing:.16em;margin-top:4px;}

/* ── Layout ── */
.wrap{max-width:1060px;margin:0 auto;padding:16px 14px 40px;
  display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:760px){
  .wrap{grid-template-columns:400px 1fr;align-items:start;}
  .col-r{grid-column:2;}
}

/* ── Card ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.ch{display:flex;align-items:center;gap:8px;padding:10px 15px;
  border-bottom:1px solid var(--border);background:var(--panel2);}
.ch-icon{font-size:14px;}
.ch-title{font-size:11px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase;font-weight:600;}
.ch-tag{margin-left:auto;font-size:9px;color:var(--muted);}
.cb{padding:13px 15px;}

/* ── Form ── */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:10px;}
.field label{display:block;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase;}
.field select,.field input[type=number]{width:100%;background:var(--panel2);border:1px solid var(--border2);
  color:var(--text);padding:7px 9px;border-radius:7px;font-family:'Noto Serif TC',serif;font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;}
.field select:focus,.field input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,168,74,.12);}
.qwrap{margin-bottom:10px;}
.qwrap label{display:block;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:5px;text-transform:uppercase;}
.qwrap textarea{width:100%;background:var(--panel2);border:1px solid var(--border2);color:var(--text);
  padding:9px 12px;border-radius:8px;font-family:'Noto Serif TC',serif;font-size:14px;
  resize:vertical;min-height:64px;max-height:130px;outline:none;line-height:1.6;
  transition:border-color .2s,box-shadow .2s;}
.qwrap textarea::placeholder{color:var(--muted);font-size:13px;}
.qwrap textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,168,74,.12);}
.qtags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.qtag{font-size:11px;padding:3px 9px;border:1px solid var(--border2);border-radius:20px;
  color:var(--text2);cursor:pointer;background:transparent;transition:all .18s;font-family:'Noto Serif TC',serif;}
.qtag:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,168,74,.08);}
.brow{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 18px;border:1px solid currentColor;background:transparent;font-family:'Noto Serif TC',serif;
  font-size:13px;letter-spacing:.08em;border-radius:7px;cursor:pointer;transition:all .2s;
  color:var(--gold);display:flex;align-items:center;gap:5px;}
.btn:hover{background:var(--gold);color:var(--bg);}
.btn.now{color:var(--teal);}
.btn.now:hover{background:var(--teal);color:var(--bg);}
.btn.primary{background:var(--gold);color:var(--bg);font-weight:600;}
.btn.primary:hover{background:var(--gold2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.compass-btn{color:#90c0e0;border-color:#90c0e0;}
.btn.compass-btn:hover{background:#90c0e0;color:var(--bg);}

/* ── Info chips ── */
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
.ichip{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;}
.ichip-l{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.ichip-v{font-size:13px;color:var(--gold);font-weight:600;margin-top:2px;}
.cv-yang{color:var(--yang);}.cv-yin{color:var(--yin);}.cv-kong{color:var(--kong-clr);}

/* ── Board ── */
.bwrap{padding:12px;}
.board{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  aspect-ratio:1/1;gap:3px;background:var(--border);
  border:1.5px solid var(--gold-dim);border-radius:9px;overflow:hidden;
  box-shadow:0 0 40px rgba(200,168,74,.1),inset 0 0 40px rgba(0,0,0,.5);}
.cell{background:var(--surface);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;padding:3px 3px 15px;position:relative;overflow:hidden;transition:background .2s;}
.cell:hover{background:#131320;}
.cell[data-p="5"]{background:#0b0b15;}
.cell.zf{background:#161408;border:1px solid rgba(200,168,74,.25);}
.cell.zs{background:#081614;border:1px solid rgba(24,176,144,.25);}
.cell.zf.zs{background:#0e1408;}
.cell.kong{background:#140808;border:1px solid rgba(176,48,48,.2);}
.pn{position:absolute;top:3px;left:5px;font-size:8px;color:var(--muted);}
.pd{position:absolute;top:3px;right:4px;font-size:7px;color:var(--muted);letter-spacing:0;}
.cg{font-size:clamp(8px,1.9vw,12px);color:var(--purple);font-weight:600;}
.cs{font-size:clamp(9px,2.1vw,13px);color:#e8b840;font-weight:700;}
.cd{font-size:clamp(8px,1.9vw,12px);color:#50c888;font-weight:600;}
.ce{font-size:clamp(8px,1.9vw,12px);font-weight:700;}
.eq{color:var(--qi-clr);}.ey{color:var(--yi-clr);}
.dv{width:50%;height:1px;background:var(--border2);margin:1px 0;flex-shrink:0;}
.bc{position:absolute;bottom:2px;font-size:7px;border-radius:3px;padding:0 3px;font-weight:700;}
.bc-zf{right:3px;color:var(--gold);background:rgba(200,168,74,.18);}
.bc-zs{left:3px;color:var(--teal2);background:rgba(24,176,144,.15);}
.bc-ko{right:3px;bottom:11px;color:var(--kong-clr);background:rgba(176,48,48,.15);}
.cn{font-size:7px;color:var(--muted);letter-spacing:0;}
.lgrow{display:flex;flex-wrap:wrap;gap:6px;padding:9px 13px;border-top:1px solid var(--border);justify-content:center;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── 指引卡 ── */
.guide-card{margin:0 15px 15px;border:1px solid var(--border2);border-radius:10px;overflow:hidden;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.gc-header{padding:13px 15px 11px;display:flex;align-items:flex-start;gap:11px;
  background:linear-gradient(135deg,#1a1a0e 0%,#12120a 100%);border-bottom:1px solid var(--border2);}
.gc-header.yin-header{background:linear-gradient(135deg,#0a121e 0%,#080e18 100%);}
.gc-badge{font-size:22px;flex-shrink:0;margin-top:2px;filter:drop-shadow(0 0 8px rgba(200,168,74,.5));}
.gc-tone{font-size:15px;color:var(--gold2);font-weight:700;letter-spacing:.05em;line-height:1.4;}
.gc-format{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.08em;}
.gc-body{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.gc-item{background:var(--panel);padding:11px 13px;display:flex;flex-direction:column;gap:4px;}
.gc-item:last-child:nth-child(odd){grid-column:1/-1;}
.gc-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:5px;}
.gc-label-icon{font-size:12px;}
.gc-val{font-size:13px;color:var(--text);line-height:1.6;}
.gc-val strong{color:var(--gold);}
.gc-quote{padding:12px 15px;background:var(--panel2);font-size:13px;color:var(--teal2);
  font-style:italic;letter-spacing:.05em;line-height:1.7;border-top:1px solid var(--border2);text-align:center;}
.gj-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:12px;
  font-weight:700;letter-spacing:.08em;margin-bottom:4px;}
.gj-ji{background:rgba(200,168,74,.2);color:var(--gold2);}
.gj-xiong{background:rgba(176,48,48,.2);color:#e06060;}
.gj-ping{background:rgba(80,80,120,.3);color:#a0a0d0;}

/* ── 指南針卡 ── */
.compass-card{
  margin:0 15px 15px;
  border:1px solid var(--border2);
  border-radius:10px;overflow:hidden;
  animation:fadeUp .5s ease;
}
.compass-card .ch{background:linear-gradient(135deg,#0a1220 0%,#080e18 100%);}
.compass-body{
  display:flex;flex-direction:column;align-items:center;
  padding:12px 12px;gap:10px;
}
/* Canvas 包裝 */
.compass-canvas-wrap{
  position:relative;
  width:min(260px,80vw);
  height:min(260px,80vw);
}
#compassCanvas{
  width:100%;height:100%;
  border-radius:50%;
  box-shadow:0 0 30px rgba(144,192,224,.2),0 0 60px rgba(0,0,0,.6);
}

/* 吉方列表 */
.ji-list{
  width:100%;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:7px;
}
.ji-item{
  display:flex;align-items:center;gap:9px;
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:8px;padding:8px 11px;cursor:pointer;
  transition:all .2s;
}
.ji-item:hover{border-color:var(--gold);background:rgba(200,168,74,.06);}
.ji-item.active{border-color:var(--gold);box-shadow:0 0 10px rgba(200,168,74,.2);}
.ji-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.ji-info{flex:1;}
.ji-dir{font-size:13px;font-weight:700;color:var(--text);}
.ji-door{font-size:10px;color:var(--muted);margin-top:1px;}

/* 羅盤狀態 */
.compass-status{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--muted);letter-spacing:.08em;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;background:var(--muted);
  transition:background .3s;
}
.status-dot.active{background:var(--teal2);box-shadow:0 0 6px var(--teal2);animation:pulse 2s infinite;}
.status-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* 偏差顯示 */
.bearing-info{
  font-size:12px;color:var(--muted);text-align:center;
  display:flex;gap:14px;justify-content:center;
}
.bearing-val{color:var(--gold);font-weight:600;font-size:14px;}

/* ── 對話區 ── */
.chat-area{display:flex;flex-direction:column;max-height:320px;min-height:100px;overflow-y:auto;
  padding:13px 15px;gap:12px;scroll-behavior:smooth;}
.chat-area::-webkit-scrollbar{width:4px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.msg{display:flex;gap:8px;align-items:flex-start;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;border:1px solid var(--border2);}
.msg.user .av{background:var(--ai-user);}
.msg.bot  .av{background:var(--panel2);}
.bubble{max-width:88%;padding:8px 12px;border-radius:11px;font-size:13px;line-height:1.75;border:1px solid var(--border);}
.msg.user .bubble{background:var(--ai-user);border-color:var(--border2);border-top-right-radius:3px;}
.msg.bot  .bubble{background:var(--ai-bot);border-top-left-radius:3px;}
.bubble strong{color:var(--gold);}
.bubble em{color:var(--teal2);font-style:normal;}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:db .9s ease-in-out infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;color:var(--muted);text-align:center;gap:8px;}
.ce-icon{font-size:30px;opacity:.35;}
.ce-text{font-size:12px;line-height:1.8;letter-spacing:.05em;}
.frow{padding:10px 15px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
.fchips{display:flex;flex-wrap:wrap;gap:5px;}
.fc{font-size:11px;padding:4px 10px;border:1px solid var(--border2);border-radius:20px;
  color:var(--text2);cursor:pointer;background:transparent;transition:all .18s;font-family:'Noto Serif TC',serif;}
.fc:hover{border-color:var(--teal2);color:var(--teal2);background:rgba(24,176,144,.08);}
.cinrow{display:flex;gap:7px;}
.cin{flex:1;background:var(--panel2);border:1px solid var(--border2);color:var(--text);
  padding:8px 12px;border-radius:8px;font-family:'Noto Serif TC',serif;font-size:13px;outline:none;transition:border-color .2s;}
.cin:focus{border-color:var(--gold);}
.cin::placeholder{color:var(--muted);}
.sbtn{padding:8px 12px;background:var(--gold);border:none;border-radius:8px;
  color:var(--bg);font-size:14px;cursor:pointer;transition:background .2s;display:flex;align-items:center;}
.sbtn:hover{background:var(--gold2);}
.sbtn:disabled{opacity:.4;cursor:not-allowed;}
/* ── 雙盤並排 ── */
.dual-compass-row{
  display:flex;
  gap:8px;
  width:100%;
  justify-content:center;
  align-items:flex-start;
}
.compass-panel{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  flex-shrink:0; /* 不讓 flex 壓縮 */
}
.compass-panel-label{
  font-size:10px;letter-spacing:.08em;color:var(--text2);
  text-transform:uppercase;font-weight:600;white-space:nowrap;
}
.compass-panel-info{
  display:flex;align-items:center;gap:5px;
}
/* canvas 包裝：尺寸由 JS 計算後設定，始終正方形 */
.compass-canvas-wrap{
  position:relative;
  /* width/height 由 JS 動態設定 */
  flex-shrink:0;
}
/* canvas 本身填滿包裝 */
#deviceCanvas,#jiCanvas{
  display:block;
  border-radius:50%;
  box-shadow:0 0 20px rgba(144,192,224,.15),0 0 40px rgba(0,0,0,.5);
}

/* 偏差提示 */
.diff-hint{
  display:flex;align-items:center;gap:14px;
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:10px;padding:10px 18px;width:100%;
  justify-content:center;
}
.diff-arrow{
  font-size:28px;transition:transform .3s ease;
  color:var(--gold);filter:drop-shadow(0 0 6px rgba(200,168,74,.5));
}
.diff-label{font-size:11px;color:var(--muted);letter-spacing:.05em;}

.calib-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(8,6,18,0.92);
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  backdrop-filter:blur(4px);
  animation:fadeIn .3s ease;
}
.calib-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:12px;text-align:center;
  width:90%;
}
.calib-icon{font-size:22px;animation:spin 4s linear infinite;}
.calib-title{
  font-family:'Ma Shan Zheng',serif;
  font-size:14px;color:var(--gold);letter-spacing:.15em;
}
.calib-desc{font-size:10px;color:var(--text2);line-height:1.6;}
.calib-desc strong{color:var(--gold2);}
.calib-heading{
  font-size:22px;font-weight:700;color:var(--teal2);
  letter-spacing:.05em;
  text-shadow:0 0 12px rgba(37,212,172,.5);
}
.calib-confirm-btn{
  padding:7px 16px;
  background:var(--teal);color:var(--bg);
  border:none;border-radius:7px;
  font-family:'Noto Serif TC',serif;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.08em;
  transition:background .2s,transform .1s;
  box-shadow:0 0 12px rgba(24,176,144,.4);
}
.calib-confirm-btn:hover{background:var(--teal2);transform:scale(1.03);}
.calib-confirm-btn:active{transform:scale(0.97);}
.calib-skip-btn{
  background:transparent;border:none;
  color:var(--muted);font-size:10px;
  cursor:pointer;text-decoration:underline;
  font-family:'Noto Serif TC',serif;
  transition:color .2s;
}
.calib-skip-btn:hover{color:var(--text2);}

/* 校準狀態列 */
.calib-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:rgba(24,176,144,.1);
  border:1px solid rgba(24,176,144,.25);
  border-radius:8px;padding:7px 14px;
  font-size:12px;color:var(--teal2);
  width:100%;
}
.calib-redo-btn{
  background:transparent;border:1px solid var(--teal);
  color:var(--teal);border-radius:5px;padding:2px 8px;
  font-size:11px;cursor:pointer;font-family:'Noto Serif TC',serif;
  transition:all .18s;
}
.calib-redo-btn:hover{background:var(--teal);color:var(--bg);}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* 校準成功動畫 */
@keyframes calibFlash{
  0%  {box-shadow:0 0 0 0 rgba(37,212,172,.8);}
  50% {box-shadow:0 0 0 10px rgba(37,212,172,0);}
  100%{box-shadow:0 0 0 0 rgba(37,212,172,0);}
}
.calib-flash{animation:calibFlash .6s ease 2;}

/* ── 分享按鈕列 ── */
.share-row{
  display:flex;gap:8px;width:100%;justify-content:center;flex-wrap:wrap;
}
.share-btn{
  display:flex;align-items:center;gap:5px;
  padding:8px 16px;
  border:1px solid var(--border2);
  background:var(--panel2);
  color:var(--text2);
  border-radius:8px;font-size:12px;
  font-family:'Noto Serif TC',serif;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.share-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,168,74,.08);}
.share-btn.dl:hover{border-color:var(--teal2);color:var(--teal2);background:rgba(37,212,172,.08);}

.hidden{display:none!important;}
</style>
</head>
<body>
<header>
  <div class="hd"></div>
  <h1>奇門遁甲</h1>
  <p class="hsub">行動指引 · 問卦諮詢 · 吉方指南針</p>
</header>

<div class="wrap">
  <!-- ═══ 左欄 ═══ -->
  <div>
    <!-- 起盤 -->
    <div class="card">
      <div class="ch"><span class="ch-icon">🗓</span><span class="ch-title">起盤設定</span></div>
      <div class="cb">
        <div class="fg">
          <div class="field"><label>年</label><input type="number" id="inYear" min="1900" max="2100"></div>
          <div class="field"><label>月</label><select id="inMonth"></select></div>
          <div class="field"><label>日</label><select id="inDay"></select></div>
          <div class="field">

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const WORKER_URL='https://arcar.kftseng2oo1.workers.dev';
const MODEL='claude-opus-4-5';

// ═══════════════════════════════════════
//  常數（完整保留 v4 邏輯）
// ═══════════════════════════════════════
const TIAN_GAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const J60=[];for(let i=0;i<60;i++)J60.push(TIAN_GAN[i%10]+DI_ZHI[i%12]);
const PDIR={1:'坎北',2:'坤西南',3:'震東',4:'巽東南',5:'中宮',6:'乾西北',7:'兌西',8:'艮東北',9:'離南'};
const STEMS9=['戊','己','庚','辛','壬','癸','丁','丙','乙'];
const SAN_QI=new Set(['丁','丙','乙']);
const DOOR_BASE={1:'休門',2:'死門',3:'傷門',4:'杜門',9:'景門',7:'驚門',6:'開門',8:'生門'};
const DOOR_SEQ=['休門','死門','傷門','杜門','景門','驚門','開門','生門'];
const DOOR_PATH=[1,2,3,4,9,6,7,8];
const STAR_BASE={1:'蓬星',2:'芮星',3:'沖星',4:'輔星',5:'禽星',6:'心星',7:'柱星',8:'任星',9:'英星'};
const STAR8=['蓬星','芮星','沖星','輔星','心星','柱星','任星','英星'];
const SPATH8=[1,2,3,4,6,7,8,9];
const GODS=['值符','螣蛇','太陰','六合','白虎','玄武','九地','九天'];
const GPATH=[1,8,3,4,9,2,7,6];
const P9=[1,2,3,4,5,6,7,8,9];
const BOARD_LO=[4,9,2,3,5,7,8,1,6];
const ZTP={子:1,丑:8,寅:8,卯:3,辰:4,巳:4,午:9,未:2,申:2,酉:7,戌:6,亥:6};
const SHI_N=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SHI_S=[0,0,2,2,4,4,6,6,8,8];

// 宮位 → 方位角（正北=0°，順時針）
// 奇門九宮方位：
//   9離=南=180°, 1坎=北=0°, 3震=東=90°, 7兌=西=270°
//   4巽=東南=135°, 8艮=東北=45°, 6乾=西北=315°, 2坤=西南=225°
const PALACE_DEG={1:0,9:180,3:90,7:270,4:135,8:45,6:315,2:225,5:null};

// 吉門：由好到次好
const JI_DOORS   =['生門','開門','休門','景門'];
const XIONG_DOORS=['死門','驚門','傷門','杜門'];

// 五行色
const WX_COLOR={
  '木':'#38b848','火':'#e85030','土':'#c89820','金':'#90c0e0','水':'#3060e0'
};
// 宮位五行
const PAL_WX={1:'水',2:'土',3:'木',4:'木',5:'土',6:'金',7:'金',8:'土',9:'火'};

// 門的吉凶色
const DOOR_COLOR={
  '生門':'#38b848','開門':'#90c0e0','休門':'#c8a84a','景門':'#d8a060',
  '死門':'#a03030','驚門':'#a03090','傷門':'#c06020','杜門':'#606090'
};

const JIEQI=[
  {name:'小寒',m:1,d:6,yang:true,baseJu:4},{name:'大寒',m:1,d:20,yang:true,baseJu:7},
  {name:'立春',m:2,d:4,yang:true,baseJu:8},{name:'雨水',m:2,d:19,yang:true,baseJu:5},
  {name:'驚蟄',m:3,d:6,yang:true,baseJu:2},{name:'春分',m:3,d:21,yang:true,baseJu:3},
  {name:'清明',m:4,d:5,yang:true,baseJu:6},{name:'穀雨',m:4,d:20,yang:true,baseJu:9},
  {name:'立夏',m:5,d:6,yang:true,baseJu:7},{name:'小滿',m:5,d:21,yang:true,baseJu:1},
  {name:'芒種',m:6,d:6,yang:true,baseJu:4},{name:'夏至',m:6,d:21,yang:false,baseJu:9},
  {name:'小暑',m:7,d:7,yang:false,baseJu:6},{name:'大暑',m:7,d:23,yang:false,baseJu:3},
  {name:'立秋',m:8,d:7,yang:false,baseJu:2},{name:'處暑',m:8,d:23,yang:false,baseJu:5},
  {name:'白露',m:9,d:8,yang:false,baseJu:8},{name:'秋分',m:9,d:23,yang:false,baseJu:7},
  {name:'寒露',m:10,d:8,yang:false,baseJu:4},{name:'霜降',m:10,d:23,yang:false,baseJu:1},
  {name:'立冬',m:11,d:7,yang:false,baseJu:3},{name:'小雪',m:11,d:22,yang:false,baseJu:9},
  {name:'大雪',m:12,d:7,yang:false,baseJu:6},{name:'冬至',m:12,d:22,yang:true,baseJu:1},
];

// ═══════════════════════════════════════
//  排盤邏輯（完整 v4）
// ═══════════════════════════════════════
function dayGZ(y,m,d){
  const diff=Math.round((new Date(y,m-1,d)-new Date(2000,0,1))/86400000);
  const idx=((40+diff)%60+60)%60;
  return{gz:J60[idx],gan:TIAN_GAN[idx%10],zhi:DI_ZHI[idx%12],idx};
}
function hgzIdx(dayIdx,shi){
  const sg=SHI_S[dayIdx%10];const hg=(sg+shi)%10;const hz=shi%12;
  for(let i=0;i<60;i++)if(i%10===hg&&i%12===hz)return i;return 0;
}
function getXun(hIdx){
  const xs=Math.floor(hIdx/10)*10;
  const YI=['戊','己','庚','辛','壬','癸'];
  const ki=[(xs%12+10)%12,(xs%12+11)%12];
  return{xunYi:YI[xs/10],xunName:J60[xs]+'旬',kongZhi:ki.map(i=>DI_ZHI[i])};
}
function getJQ(m,d){
  const cur=m*100+d;let best=null;
  for(const jq of JIEQI){const v=jq.m*100+jq.d;if(v<=cur&&(!best||v>best.v))best={...jq,v};}
  return best||JIEQI[JIEQI.length-1];
}
function calcJu(y,m,d){
  const jq=getJQ(m,d);const dun=jq.yang?'陽遁':'陰遁';
  const diff=Math.round((new Date(y,m-1,d)-new Date(y,jq.m-1,jq.d))/86400000);
  const yi=Math.min(Math.floor(diff/5),2);
  const YUAN=['上元','中元','下元'];
  const ju=jq.yang?((jq.baseJu-1+yi)%9)+1:((jq.baseJu-1-yi+9)%9)+1;
  return{dun,ju,jieqi:jq.name,yuan:YUAN[yi]};
}
function epFn(ju,dun){
  const ep={};
  for(let i=0;i<9;i++){const idx=dun==='陽遁'?(ju-1+i)%9:((ju-1-i)%9+9)%9;ep[P9[idx]]=STEMS9[i];}
  return ep;
}
function hpFn(xp,zfs,dun){
  const hp={};let s2=zfs==='禽星'?'芮星':zfs;
  const si=STAR8.indexOf(s2);const pi=SPATH8.indexOf(xp===5?2:xp);
  for(let i=0;i<8;i++){
    const s=dun==='陽遁'?(si+i)%8:((si-i)%8+8)%8;
    const p=dun==='陽遁'?(pi+i)%8:((pi-i)%8+8)%8;
    hp[SPATH8[p]]=STAR8[s];
  }hp[5]='（禽★2）';return hp;
}
function hmpFn(zsp,zsd,dun){
  const hmp={};const di=DOOR_SEQ.indexOf(zsd);const pi=Math.max(DOOR_PATH.indexOf(zsp),0);
  for(let i=0;i<8;i++){
    const d2=dun==='陽遁'?(di+i)%8:((di-i)%8+8)%8;
    const p2=dun==='陽遁'?(pi+i)%8:((pi-i)%8+8)%8;
    hmp[DOOR_PATH[p2]]=DOOR_SEQ[d2];
  }hmp[5]='（無門）';return hmp;
}
function gpFn(xp,dun){
  const gp={};const si=GPATH.indexOf(xp===5?2:xp);
  for(let i=0;i<8;i++){const p=dun==='陽遁'?(si+i)%8:((si-i)%8+8)%8;gp[GPATH[p]]=GODS[i];}
  gp[5]='（無神）';return gp;
}
function zspalFn(xp,hIdx,dun){
  const diff=hIdx%10;const ci=P9.indexOf(xp);
  let ti=dun==='陽遁'?(ci+diff)%9:((ci-diff)%9+9)%9;
  let p=P9[ti];if(p===5)p=dun==='陽遁'?8:2;return p;
}
function doBoard(y,m,d,shi){
  const dgz=dayGZ(y,m,d);const hi=hgzIdx(dgz.idx,shi);
  const hganIdx=(SHI_S[dgz.idx%10]+shi)%10;
  const{dun,ju,jieqi,yuan}=calcJu(y,m,d);
  const ep=epFn(ju,dun);
  const{xunYi,xunName,kongZhi}=getXun(hi);
  const kongPals=new Set(kongZhi.map(z=>ZTP[z]).filter(Boolean));
  let xp=Object.entries(ep).find(([,s])=>s===xunYi)?.[0];xp=xp?+xp:ju;
  const zfs=STAR_BASE[xp]||'蓬星';const zsd=DOOR_BASE[xp]||'休門';
  const zsp=zspalFn(xp,hi,dun);
  const hp=hpFn(xp,zfs,dun);const hmp=hmpFn(zsp,zsd,dun);const gp=gpFn(xp,dun);
  return{dun,ju,jieqi,yuan,ep,hp,hmp,gp,
    dayGZ:dgz,hgan:TIAN_GAN[hganIdx],hzhi:DI_ZHI[shi],hi,
    xp,xunYi,xunName,kongZhi,kongPals,zfs,zsd,zsp};
}

// ═══════════════════════════════════════
//  吉方計算
// ═══════════════════════════════════════
function calcJiFang(R){
  // 收集所有宮位的門，按吉凶排序
  const result=[];
  for(const pal of [1,2,3,4,6,7,8,9]){
    const door=R.hmp[pal];
    const deg=PALACE_DEG[pal];
    if(deg===null) continue;
    const isKong=R.kongPals.has(pal);
    const jiRank=JI_DOORS.indexOf(door);
    const xiongRank=XIONG_DOORS.indexOf(door);
    result.push({pal,door,deg,isKong,jiRank,xiongRank,
      wx:PAL_WX[pal],color:DOOR_COLOR[door]||'#808080'});
  }
  // 吉門優先（非旬空），再按 jiRank 排序
  result.sort((a,b)=>{
    const aJi=a.jiRank>=0&&!a.isKong;const bJi=b.jiRank>=0&&!b.isKong;
    if(aJi&&!bJi)return -1;if(!aJi&&bJi)return 1;
    if(aJi&&bJi)return a.jiRank-b.jiRank;
    return a.xiongRank-b.xiongRank;
  });
  return result;
}

// ═══════════════════════════════════════
//  指南針狀態
// ═══════════════════════════════════════
let compassActive=false;
let deviceHeading=null;     // 感應器原始讀值（0-360）
let calibOffset=0;          // 校準偏移量：calibratedHeading = rawHeading - calibOffset
let isCalibrated=false;     // 是否已完成校準
let calibPending=false;     // 校準覆蓋層是否顯示中
let targetDeg=0;
let jiFangList=[];
let selectedJiIdx=0;
let rafId=null;
let compassGranted=false;

// 取得校準後的朝向（確保 0-360）
function getCalibratedHeading(){
  if(deviceHeading===null) return null;
  return ((deviceHeading - calibOffset) % 360 + 360) % 360;
}

function setCompassStatus(state,text){
  const dot=document.getElementById('statusDot');
  const txt=document.getElementById('statusText');
  dot.className='status-dot'+(state==='active'?' active':state==='error'?' error':'');
  txt.textContent=text;
}

async function startCompass(){
  const btn=document.getElementById('btnCompass');
  if(typeof DeviceOrientationEvent!=='undefined'
     && typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const perm=await DeviceOrientationEvent.requestPermission();
      if(perm!=='granted'){setCompassStatus('error','感應器權限被拒絕');return;}
      compassGranted=true;
    }catch(e){setCompassStatus('error','權限請求失敗：'+e.message);return;}
  }else{compassGranted=true;}

  window.addEventListener('deviceorientationabsolute',onOrientation,true);
  window.addEventListener('deviceorientation',onOrientation,true);
  compassActive=true;
  btn.textContent='🧭 感應器啟動中…';
  btn.disabled=true;
  setCompassStatus('active','感應器已啟動');

  // 稍等感應器穩定後再顯示校準畫面
  setTimeout(showCalibrationOverlay, 800);
  rafId=requestAnimationFrame(drawCompass);
}

function showCalibrationOverlay(){
  calibPending=true;
  document.getElementById('calibOverlay').classList.remove('hidden');
}

function confirmCalibration(){
  if(deviceHeading===null) return;
  // 記錄當前讀值作為偏移量（此時裝置對準北方，rawHeading 應為 0°）
  calibOffset=deviceHeading;
  isCalibrated=true;
  calibPending=false;
  document.getElementById('calibOverlay').classList.add('hidden');
  // 顯示校準狀態列
  const bar=document.getElementById('calibBar');
  bar.classList.remove('hidden');
  document.getElementById('calibBarText').textContent=
    `已校準（偏移 ${Math.round(calibOffset)}°）`;
  // 成功動畫
  const wrap=document.querySelector('.compass-canvas-wrap');
  wrap.classList.add('calib-flash');
  setTimeout(()=>wrap.classList.remove('calib-flash'),1300);
  setCompassStatus('active','已校準・追蹤中');
  updateDiffBearing();
}

function skipCalibration(){
  calibOffset=0;
  isCalibrated=true;
  calibPending=false;
  document.getElementById('calibOverlay').classList.add('hidden');
  document.getElementById('calibBar').classList.remove('hidden');
  document.getElementById('calibBarText').textContent='已略過校準（以感應器原始值為準）';
  setCompassStatus('active','感應器追蹤中');
}

function redoCalibration(){
  isCalibrated=false;
  calibPending=true;
  document.getElementById('calibOverlay').classList.remove('hidden');
  setCompassStatus('active','重新校準中…');
}

function onOrientation(e){
  let heading=null;
  if(e.webkitCompassHeading!==undefined&&e.webkitCompassHeading!==null){
    heading=e.webkitCompassHeading;
  }else if(e.absolute&&e.alpha!==null){
    heading=(360-e.alpha)%360;
  }else if(e.alpha!==null){
    heading=(360-e.alpha)%360;
  }
  if(heading===null) return;
  deviceHeading=heading;

  // 校準覆蓋層：顯示原始讀值（未校準）
  if(calibPending){
    document.getElementById('calibHeadingShow').textContent=
      Math.round(heading)+'°';
  }

  // 正常追蹤：使用校準後的值
  const cal=getCalibratedHeading();
  if(cal!==null){
    document.getElementById('deviceBearing').textContent=Math.round(cal)+'°';
    updateDiffBearing();
  }
}

function selectJiFang(idx){
  selectedJiIdx=idx;
  targetDeg=jiFangList[idx]?.deg||0;
  document.getElementById('targetBearing').textContent=Math.round(targetDeg)+'°';
  updateDiffBearing();
  // 更新清單高亮
  document.querySelectorAll('.ji-item').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });
}
function updateDiffBearing(){
  const cal=getCalibratedHeading();
  if(cal===null) return;
  let diff=targetDeg-cal;
  diff=((diff+180)%360+360)%360-180;
  document.getElementById('diffBearing').textContent=
    (diff>=0?'+':'')+Math.round(diff)+'°';
}

// ═══════════════════════════════════════
//  Canvas 尺寸：動態計算正方形，解決橢圓問題
// ═══════════════════════════════════════
function resizeCanvases(){
  const row=document.getElementById('compassCard')?.querySelector('.dual-compass-row');
  if(!row) return;
  // 可用寬度 = card 內容寬 - gap - padding
  const cardW=row.getBoundingClientRect().width;
  const gap=8;
  // 每個盤面的邊長：(總寬-gap)/2，最大 200，最小 130
  const size=Math.min(200,Math.max(130,Math.floor((cardW-gap)/2)));

  ['deviceCanvas','jiCanvas'].forEach(id=>{
    const c=document.getElementById(id);
    if(!c) return;
    // 設定 canvas 內部解析度（畫質）：2x device pixel ratio
    const dpr=window.devicePixelRatio||1;
    c.width =size*dpr;
    c.height=size*dpr;
    // 設定 CSS 顯示尺寸（正方形，防橢圓）
    c.style.width =size+'px';
    c.style.height=size+'px';
    // 同步更新 wrap 尺寸
    const wrap=c.parentElement;
    if(wrap){wrap.style.width=size+'px';wrap.style.height=size+'px';}
  });
  // 重繪
  drawDeviceCompass();
  drawJiCompass();
}

// 合成一張圖：左盤 + 右盤 + 底部資訊
function buildShareCanvas(){
  const dc=document.getElementById('deviceCanvas');
  const jc=document.getElementById('jiCanvas');
  if(!dc||!jc) return null;

  const dpr=window.devicePixelRatio||1;
  const S=dc.width; // 每個盤的實際像素尺寸（含 dpr）
  const GAP=Math.round(12*dpr);
  const PAD=Math.round(16*dpr);
  const INFO_H=Math.round(90*dpr);
  const TOTAL_W=S*2+GAP+PAD*2;
  const TOTAL_H=S+PAD*2+INFO_H;

  const c=document.createElement('canvas');
  c.width=TOTAL_W; c.height=TOTAL_H;
  const ctx=c.getContext('2d');

  // 背景
  const bg=ctx.createLinearGradient(0,0,TOTAL_W,TOTAL_H);
  bg.addColorStop(0,'#0e0c1e');bg.addColorStop(1,'#080614');
  ctx.fillStyle=bg;ctx.fillRect(0,0,TOTAL_W,TOTAL_H);

  // 貼兩個盤
  ctx.drawImage(dc, PAD, PAD, S, S);
  ctx.drawImage(jc, PAD+S+GAP, PAD, S, S);

  // 底部文字
  const fSz=Math.round(13*dpr);
  const fSzSm=Math.round(10*dpr);
  ctx.font=`700 ${fSz}px 'Noto Serif TC',serif`;
  ctx.fillStyle='#c8a84a';ctx.textAlign='center';ctx.textBaseline='top';

  const Y=S+PAD+Math.round(10*dpr);
  // 盤局資訊
  const R=curBoard;
  if(R){
    ctx.fillText(`${R.dun} ${R.ju}局・${R.jieqi}${R.yuan}`, TOTAL_W/2, Y);
    ctx.font=`${fSzSm}px serif`;
    ctx.fillStyle='#7a7a9a';
    const ji=jiFangList[selectedJiIdx];
    if(ji){
      ctx.fillText(`吉方：${PDIR[ji.pal]} (${ji.door})`, TOTAL_W/2, Y+fSz+Math.round(6*dpr));
    }
    ctx.fillText('奇門遁甲・行動指引', TOTAL_W/2, Y+fSz*2+Math.round(14*dpr));
  }
  return c;
}

async function downloadCompass(){
  const c=buildShareCanvas();
  if(!c){alert('請先起盤');return;}
  const a=document.createElement('a');
  a.href=c.toDataURL('image/png');
  const now=new Date();
  a.download=`qimen_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.png`;
  a.click();
}

async function shareCompass(){
  const c=buildShareCanvas();
  if(!c){alert('請先起盤');return;}
  // 轉 Blob
  c.toBlob(async blob=>{
    const file=new File([blob],'qimen_compass.png',{type:'image/png'});
    if(navigator.share && navigator.canShare({files:[file]})){
      try{
        const R=curBoard;
        const ji=jiFangList[selectedJiIdx];
        await navigator.share({
          title:'奇門遁甲・吉方指引',
          text: R?`${R.dun}${R.ju}局・${R.jieqi}${R.yuan}\n吉方：${PDIR[ji?.pal]||'—'} (${ji?.door||'—'})`:'奇門遁甲吉方指引',
          files:[file],
        });
      }catch(e){if(e.name!=='AbortError')console.error(e);}
    } else {
      // fallback：直接下載
      downloadCompass();
    }
  },'image/png');
}

// ── 共用：畫圓形背景
function drawBg(ctx, R){
  const grad=ctx.createRadialGradient(0,0,0,0,0,R);
  grad.addColorStop(0,'#1a1428');
  grad.addColorStop(0.7,'#0e0c1e');
  grad.addColorStop(1,'#07060f');
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);
  ctx.fillStyle=grad;ctx.fill();
}

// ── 共用：畫外圓框
function drawRings(ctx, R){
  ctx.beginPath();ctx.arc(0,0,R*0.97,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,168,74,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,R*0.70,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,168,74,0.3)';ctx.lineWidth=1;ctx.stroke();
}

// ── 共用：畫刻度（傳入底盤已旋轉的 ctx）
function drawTicks(ctx, R){
  for(let deg=0;deg<360;deg+=5){
    const a=deg*Math.PI/180;
    const isMajor=deg%45===0;const isMinor=deg%15===0;
    const inner=isMajor?R*0.88:isMinor?R*0.90:R*0.92;
    ctx.save();ctx.rotate(a);
    ctx.beginPath();ctx.moveTo(0,-inner);ctx.lineTo(0,-R*0.96);
    ctx.strokeStyle=isMajor?'rgba(200,168,74,0.9)':isMinor?'rgba(200,168,74,0.5)':'rgba(200,168,74,0.22)';
    ctx.lineWidth=isMajor?2:0.8;ctx.stroke();
    ctx.restore();
  }
}

// ── 共用：畫八卦文字（在已旋轉的底盤 ctx 中，rot=底盤總旋轉量）
function drawDirs(ctx, R, rot, colorFn){
  const dirs=[
    {t:'離',deg:180,color:'#e87050'},
    {t:'坎',deg:0,  color:'#5080e8'},
    {t:'震',deg:90, color:'#40c858'},
    {t:'兌',deg:270,color:'#90c8e8'},
    {t:'巽',deg:135,color:'#70b840'},
    {t:'艮',deg:45, color:'#5888c8'},
    {t:'坤',deg:225,color:'#c0a030'},
    {t:'乾',deg:315,color:'#80a8d0'},
  ];
  for(const d of dirs){
    const a=d.deg*Math.PI/180;
    ctx.save();ctx.rotate(a);ctx.translate(0,-R*0.80);
    ctx.rotate(-a-rot);
    ctx.font=`bold ${R*0.09}px 'Noto Serif TC',serif`;
    ctx.fillStyle=colorFn?colorFn(d):d.color;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.t,0,0);ctx.restore();
  }
}

// ── 共用：畫太極中心
function drawTaiji(ctx, R){
  const tR=R*0.10;
  const grad=ctx.createRadialGradient(0,0,0,0,0,R*0.15);
  grad.addColorStop(0,'#2a2040');grad.addColorStop(1,'#14101e');
  ctx.beginPath();ctx.arc(0,0,R*0.15,0,Math.PI*2);
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='rgba(200,168,74,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  // 太極圖
  ctx.beginPath();ctx.arc(0,0,tR,0,Math.PI*2);
  ctx.fillStyle='rgba(240,224,144,0.9)';ctx.fill();
  ctx.beginPath();
  ctx.arc(0,0,tR,-Math.PI/2,Math.PI/2);
  ctx.lineTo(0,tR);ctx.arc(0,tR/2,tR/2,Math.PI/2,-Math.PI/2,true);
  ctx.arc(0,-tR/2,tR/2,Math.PI/2,-Math.PI/2);ctx.closePath();
  ctx.fillStyle='rgba(20,14,32,0.95)';ctx.fill();
  ctx.beginPath();ctx.arc(0,-tR/2,tR/6,0,Math.PI*2);ctx.fillStyle='rgba(240,224,144,0.9)';ctx.fill();
  ctx.beginPath();ctx.arc(0,tR/2,tR/6,0,Math.PI*2);ctx.fillStyle='rgba(20,14,32,0.95)';ctx.fill();
}

// ════════════════════════════════════════
//  裝置羅盤（隨裝置旋轉，北固定朝上）
//  只顯示方位，不顯示吉凶門
// ════════════════════════════════════════
function drawDeviceCompass(){
  const canvas=document.getElementById('deviceCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,CX=W/2,R=W/2-4;
  ctx.clearRect(0,0,W,W);

  ctx.save();ctx.translate(CX,CX);
  drawBg(ctx,R);

  // 底盤旋轉：北朝上
  // rot = -π/2（讓Canvas 0°/右 → 0°/上）再 + calHeading（裝置補償）
  const cal=getCalibratedHeading();
  const rot=-Math.PI/2+(cal!==null?cal*Math.PI/180:0);
  ctx.save();ctx.rotate(rot);

  // 五行底色扇形
  const wx=[
    {deg:180,span:72,c:'rgba(232,80,48,0.15)'},
    {deg:90, span:72,c:'rgba(56,184,72,0.15)'},
    {deg:0,  span:72,c:'rgba(48,96,224,0.15)'},
    {deg:270,span:72,c:'rgba(144,192,224,0.15)'},
    {deg:45, span:36,c:'rgba(200,152,32,0.12)'},
    {deg:135,span:36,c:'rgba(200,152,32,0.12)'},
    {deg:225,span:36,c:'rgba(200,152,32,0.12)'},
    {deg:315,span:36,c:'rgba(200,152,32,0.12)'},
  ];
  for(const s of wx){
    const a1=s.deg*Math.PI/180-s.span/2*Math.PI/180;
    const a2=s.deg*Math.PI/180+s.span/2*Math.PI/180;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R*0.86,a1,a2);ctx.closePath();
    ctx.fillStyle=s.c;ctx.fill();
  }
  drawTicks(ctx,R);
  drawRings(ctx,R);
  drawDirs(ctx,R,rot);
  ctx.restore(); // 結束底盤旋轉

  // 固定正北三角指標（紅色，始終指向畫面正上方）
  ctx.save();
  ctx.shadowColor='#e85030';ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(0,-R*0.92);ctx.lineTo(-5,-R*0.80);ctx.lineTo(5,-R*0.80);ctx.closePath();
  ctx.fillStyle='#e85030';ctx.fill();
  ctx.shadowBlur=0;ctx.restore();

  drawTaiji(ctx,R);

  // 無感應器提示
  if(!compassActive){
    ctx.font=`${R*0.09}px 'Noto Serif TC',serif`;
    ctx.fillStyle='rgba(160,152,124,0.6)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('開啟感應器',0,-R*0.02);
  }

  ctx.restore();
}

// ════════════════════════════════════════
//  吉方羅盤（固定不動，坎北永遠在12點）
//  顯示各宮位的門，選中吉方高亮
// ════════════════════════════════════════
function drawJiCompass(){
  const canvas=document.getElementById('jiCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,CX=W/2,R=W/2-4;
  ctx.clearRect(0,0,W,W);

  ctx.save();ctx.translate(CX,CX);
  drawBg(ctx,R);

  // 固定底盤：坎北在12點（rot = -π/2 只做Canvas坐標修正，不旋轉）
  const rot=-Math.PI/2;
  ctx.save();ctx.rotate(rot);

  // 吉門扇形（整個扇形區塊）
  for(const ji of jiFangList){
    const a1=ji.deg*Math.PI/180-18*Math.PI/180;
    const a2=ji.deg*Math.PI/180+18*Math.PI/180;
    const isSelected=(jiFangList.indexOf(ji)===selectedJiIdx);
    ctx.beginPath();ctx.arc(0,0,R*0.86,a1,a2);ctx.arc(0,0,R*0.38,a2,a1,true);ctx.closePath();
    // 吉門/凶門分色，選中高亮
    let alpha=ji.jiRank>=0?(0.22-ji.jiRank*0.04):0.08;
    if(ji.isKong) alpha=0.06;
    if(isSelected) alpha=Math.min(alpha*2.5,0.55);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=ji.color;ctx.fill();
    ctx.globalAlpha=1;
    // 選中邊框
    if(isSelected){
      ctx.beginPath();ctx.arc(0,0,R*0.86,a1,a2);ctx.arc(0,0,R*0.38,a2,a1,true);ctx.closePath();
      ctx.strokeStyle=ji.color;ctx.lineWidth=2;
      ctx.globalAlpha=0.7;ctx.stroke();ctx.globalAlpha=1;
    }
  }

  // 分隔線（每45度）
  for(let deg=0;deg<360;deg+=45){
    const a=deg*Math.PI/180;
    ctx.save();ctx.rotate(a);
    ctx.beginPath();ctx.moveTo(0,-R*0.38);ctx.lineTo(0,-R*0.87);
    ctx.strokeStyle='rgba(200,168,74,0.25)';ctx.lineWidth=0.8;ctx.stroke();
    ctx.restore();
  }

  drawTicks(ctx,R);
  drawRings(ctx,R);

  // 門名標籤（中環）
  for(const ji of jiFangList){
    const a=ji.deg*Math.PI/180;
    const tr=R*0.62;
    ctx.save();ctx.rotate(a);ctx.translate(0,-tr);
    ctx.rotate(-a-rot);
    const isSelected=(jiFangList.indexOf(ji)===selectedJiIdx);
    ctx.font=`700 ${R*0.076}px 'Noto Serif TC',serif`;
    ctx.fillStyle=ji.isKong?'rgba(160,80,80,0.75)':ji.color;
    ctx.globalAlpha=isSelected?1:0.75;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ji.door.replace('門',''),0,-R*0.035);
    if(ji.isKong){
      ctx.font=`${R*0.055}px serif`;ctx.fillStyle='rgba(176,48,48,0.9)';
      ctx.fillText('空',0,R*0.065);
    }
    ctx.globalAlpha=1;ctx.restore();
  }

  drawDirs(ctx,R,rot);
  ctx.restore(); // 結束底盤

  // 選中吉方的指示箭頭（固定朝12點方向為目標方位）
  if(jiFangList.length>0){
    const ji=jiFangList[selectedJiIdx];
    // 在盤面上畫一個指向選中方位的光暈環
    const a=(ji.deg-90)*Math.PI/180; // 轉成Canvas角度
    const tx=Math.cos(a)*R*0.62;
    const ty=Math.sin(a)*R*0.62;
    ctx.save();
    ctx.shadowColor=ji.color;ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(tx,ty,R*0.07,0,Math.PI*2);
    ctx.fillStyle=ji.color;ctx.globalAlpha=0.9;ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // 標示「目標」文字
    ctx.font=`700 ${R*0.065}px 'Noto Serif TC',serif`;
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('★',tx,ty);
    ctx.restore();
  }

  drawTaiji(ctx,R);
  ctx.restore();
}

// ── 主循環
function drawCompass(){
  drawDeviceCompass();
  drawJiCompass();
  updateDiffArrow();
  if(compassActive) rafId=requestAnimationFrame(drawCompass);
}

// 偏差箭頭提示
function updateDiffArrow(){
  const cal=getCalibratedHeading();
  if(cal===null||jiFangList.length===0){
    document.getElementById('diffHint').style.opacity='0.4';
    return;
  }
  let diff=targetDeg-cal;
  diff=((diff+180)%360+360)%360-180;
  const arrow=document.getElementById('diffArrow');
  // 旋轉箭頭指示需要轉的方向與角度
  const clampedDeg=Math.max(-150,Math.min(150,diff));
  arrow.style.transform=`rotate(${clampedDeg}deg)`;
  document.getElementById('diffBearing').textContent=
    (Math.abs(Math.round(diff))<3?'✓ 已對準':(diff>0?'右轉 ':'左轉 ')+Math.abs(Math.round(diff))+'°');
  document.getElementById('diffHint').style.opacity='1';
}

  requestAnimationFrame(()=>{

  });
}

const GEJU_DB={'青龍返首':{lv:'吉',icon:'🐉',note:'突破困境'},'飛鳥跌穴':{lv:'吉',icon:'🦅',note:'精準落點'},
  '虎猖狂':{lv:'凶',icon:'🐅',note:'小心衝突'},'天網四張':{lv:'凶',icon:'🕸',note:'多重阻礙'},
  '五不遇時':{lv:'凶',icon:'⚠',note:'時機未到'},'伏吟':{lv:'凶',icon:'😶',note:'原地踏步'},
  '反吟':{lv:'凶',icon:'🔄',note:'方向需調整'},'普通盤':{lv:'平',icon:'☯',note:'穩紮穩打'}};

function renderGuideCard(json,R){
  const lv=json.geju_level||'平';
  const lvTag=lv==='吉'?'gj-ji':lv==='凶'?'gj-xiong':'gj-ping';
  const gjInfo=GEJU_DB[json.geju]||{lv,icon:'☯',note:''};
  document.getElementById('guideSlot').innerHTML=`
  <div class="guide-card">
    <div class="gc-header${R.dun==='陰遁'?' yin-header':''}">
      <div class="gc-badge">${gjInfo.icon||'☯'}</div>
      <div>
        <span class="gj-tag ${lvTag}">${lv}｜${json.geju}</span>
        <div class="gc-tone">${json.tone}</div>
        <div class="gc-format">${gjInfo.note||''}</div>
      </div>
    </div>
    <div class="gc-body">
      <div class="gc-item">
        <div class="gc-label"><span class="gc-label-icon">⏰</span>時機</div>
        <div class="gc-val">${json.timing}</div>
      </div>
      <div class="gc-item">
        <div class="gc-label"><span class="gc-label-icon">🧭</span>方位</div>
        <div class="gc-val">${json.location}</div>
      </div>
      <div class="gc-item">
        <div class="gc-label"><span class="gc-label-icon">🤝</span>人際</div>
        <div class="gc-val">${json.people}</div>
      </div>
      <div class="gc-item">
        <div class="gc-label"><span class="gc-label-icon">✨</span>物件</div>
        <div class="gc-val">${json.object}</div>
      </div>
    </div>
    <div class="gc-quote">「 ${json.ai_quote} 」</div>
  </div>`;
}

// ═══════════════════════════════════════
//  AI
// ═══════════════════════════════════════
let chatHist=[];let curBoard=null;

const SYSTEM_PROMPT=`# Role
你是一位精通「現代行為科學」與「奇門遁甲」的戰略決策顧問。你的任務是將排盤結果轉化為使用者一看就懂的「行動指引卡」。

# 翻譯邏輯（Mapping Logic）
- 生門→主動出擊創造機會 | 休門→充電等待 | 開門→勇敢開創 | 死門→終結重啟
- 景門→表達展示 | 傷門→行動但防衝突 | 杜門→謀定後動 | 驚門→留意變數
- 值符→掌握主動 | 螣蛇→防信息失真 | 太陰→低調佈局
- 六合→借助合作 | 白虎→避免正面衝突 | 玄武→留意背後隱患
- 九地→打好基礎 | 九天→大膽突破
- 三奇（丁丙乙）→特助降臨 | 旬空→該方位力量缺位

# 負面格局轉化原則
絕對禁止使用恐嚇性語言。死門=終結重啟；凶神=提高警覺；旬空=低調換方向。

# Output Format（嚴格輸出 JSON，不得有其他文字）
{"geju":"格局名稱","geju_level":"吉/凶/平","tone":"10字以內能量定調",
"timing":"【時】具體建議","location":"【地】方位建議",
"people":"【人】人際建議","object":"【物】穿搭建議","ai_quote":"戰略金句"}`;

function buildUserMsg(R,q){
  const jiDir=Object.entries(R.hmp)
    .filter(([,d])=>JI_DOORS.includes(d))
    .map(([p,d])=>`${d}/${PDIR[p]}`).join('、');
  const qiPals=Object.entries(R.ep).filter(([,s])=>SAN_QI.has(s)).map(([p,s])=>`${s}在${PDIR[p]}`);
  const payload={dun:R.dun,ju:R.ju+'局',jieqi:R.jieqi,yuan:R.yuan,
    zhifu:{palace:PDIR[R.xp],star:R.zfs,door:DOOR_BASE[R.xp]||'—',god:R.gp[R.xp]},
    zhishi:{palace:PDIR[R.zsp],door:R.zsd,star:R.hp[R.zsp],god:R.gp[R.zsp]},
    ji_fang:jiDir||'平均分佈',san_qi:qiPals.length?qiPals.join('、'):'無',
    xun_kong:R.kongZhi.join('、'),
    nine_palaces:BOARD_LO.map(p=>({palace:PDIR[p],god:R.gp[p],star:R.hp[p],door:R.hmp[p],earth:R.ep[p]})),
    user_question:q};
  return `以下是奇門遁甲盤局（JSON），請生成行動指引卡：\n\n${JSON.stringify(payload,null,2)}`;
}
async function callAI(msg,first){
  chatHist.push({role:'user',content:msg});
  const sys=first?SYSTEM_PROMPT:`你是奇門遁甲戰略顧問，用溫暖現代語言回覆追問，150-250字，繁體中文，不重新輸出JSON。`;
  const resp=await fetch(WORKER_URL,{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:MODEL,max_tokens:1000,system:sys,messages:chatHist})});
  if(!resp.ok)throw new Error(`API ${resp.status}`);
  const data=await resp.json();
  const text=data.content?.[0]?.text||'';
  chatHist.push({role:'assistant',content:text});
  return text;
}
function parseJSON(text){
  const s=text.indexOf('{'),e=text.lastIndexOf('}');
  if(s>=0&&e>s){try{return JSON.parse(text.slice(s,e+1));}catch(err){}}
  return{geju:'平穩局勢',geju_level:'平',tone:'穩健前行',timing:text,
    location:'正前方',people:'保持誠信',object:'素色穿搭',ai_quote:'每一步都算數。'};
}
function appendMsg(role,html){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');div.className=`msg ${role}`;
  div.innerHTML=`<div class="av">${role==='user'?'🙋':'🔮'}</div><div class="bubble">${html}</div>`;
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}
function addTyping(){
  const area=document.getElementById('chatArea');
  const d=document.createElement('div');d.className='msg bot';d.id='tdot';
  d.innerHTML=`<div class="av">🔮</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(d);area.scrollTop=area.scrollHeight;
}
function rmTyping(){document.getElementById('tdot')?.remove();}
function fmtMD(t){
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<em>$1</em>').replace(/\n/g,'<br>');
}
function showFollowup(){
  document.getElementById('frow').classList.remove('hidden');
  const FTOPICS=['這個格局好不好？','吉方如何利用？','要避免哪些事？','最佳行動時機？','旬空的影響？'];
  document.getElementById('fchips').innerHTML=FTOPICS.map(t=>
    `<button class="fc" onclick="sendFT('${t}')">${t}</button>`).join('');
}
async function sendFollowup(){const inp=document.getElementById('cin');const q=inp.value.trim();if(!q)return;inp.value='';await sendFT(q);}
async function sendFT(q){
  if(!curBoard)return;setDis(true);
  const area=document.getElementById('chatArea');area.classList.remove('hidden');
  appendMsg('user',q);addTyping();
  try{const r=await callAI(q,false);rmTyping();appendMsg('bot',fmtMD(r));}
  catch(e){rmTyping();appendMsg('bot','⚠️ '+e.message);}
  setDis(false);area.scrollTop=area.scrollHeight;
}
function setDis(v){document.getElementById('sbtn').disabled=v;document.getElementById('btnGo').disabled=v;}

// ═══════════════════════════════════════
//  UI Init
// ═══════════════════════════════════════
(function init(){
  const ms=document.getElementById('inMonth');
  for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.text=m+'月';ms.appendChild(o);}
  ms.addEventListener('change',updDays);
  document.getElementById('inYear').addEventListener('change',updDays);
  document.getElementById('modelTag').textContent=MODEL;
  setNow();
})();
function updDays(){
  const y=+document.getElementById('inYear').value||2025;
  const m=+document.getElementById('inMonth').value||1;
  const days=new Date(y,m,0).getDate();
  const ds=document.getElementById('inDay');const prev=+ds.value||1;
  ds.innerHTML='';
  for(let d=1;d<=days;d++){const o=document.createElement('option');o.value=d;o.text=d+'日';ds.appendChild(o);}
  ds.value=Math.min(prev,days);
}
function setNow(){
  const n=new Date();
  document.getElementById('inYear').value=n.getFullYear();
  document.getElementById('inMonth').value=n.getMonth()+1;
  updDays();
  document.getElementById('inDay').value=n.getDate();
  const h=n.getHours();
  document.getElementById('inHour').value=h<1||h>=23?0:Math.floor((h+1)/2);
}
function setQ(q){document.getElementById('userQ').value=q;}

// ═══════════════════════════════════════
//  主程式
// ═══════════════════════════════════════
async function doLayout(){
  const y=+document.getElementById('inYear').value;
  const m=+document.getElementById('inMonth').value;
  const d=+document.getElementById('inDay').value;
  const shi=+document.getElementById('inHour').value;
  const q=document.getElementById('userQ').value.trim();
  if(!q){
    const ta=document.getElementById('userQ');
    ta.style.borderColor='var(--gold)';ta.focus();
    setTimeout(()=>ta.style.borderColor='',1800);return;
  }
  setDis(true);
  try{
    const R=doBoard(y,m,d,shi);curBoard=R;chatHist=[];
    renderInfo(R);renderBoard(R);
    document.getElementById('cardInfo').classList.remove('hidden');
    document.getElementById('cardBoard').classList.remove('hidden');
    // 指南針
    renderCompass(R);
    // AI 指引卡
    document.getElementById('guideSlot').innerHTML=`
      <div class="chat-empty"><div class="ce-icon" style="animation:db .9s ease-in-out infinite">☯</div>
      <div class="ce-text">AI 正在解讀盤局…</div></div>`;
    document.getElementById('chatArea').classList.add('hidden');
    document.getElementById('chatArea').innerHTML='';
    document.getElementById('frow').classList.add('hidden');
    const reply=await callAI(buildUserMsg(R,q),true);
    renderGuideCard(parseJSON(reply),R);
    showFollowup();
  }catch(e){
    document.getElementById('guideSlot').innerHTML=`
      <div class="chat-empty"><div class="ce-text" style="color:var(--red)">⚠️ ${e.message}</div></div>`;
    console.error(e);
  }
  setDis(false);
}

window.addEventListener('load',setNow);
window.addEventListener('resize',()=>{
  if(document.getElementById('compassCard')?.classList.contains('hidden')) return;
  resizeCanvases();
});
// 頁面關閉時清理
window.addEventListener('beforeunload',()=>{
  window.removeEventListener('deviceorientationabsolute',onOrientation,true);
  window.removeEventListener('deviceorientation',onOrientation,true);
  if(rafId)cancelAnimationFrame(rafId);
});
</script>
