<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- 背景深空漸層 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a1a35"/>
      <stop offset="60%"  stop-color="#0e0e20"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>

    <!-- 金色光暈漸層 -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8cc70" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8a84a" stop-opacity="0"/>
    </radialGradient>

    <!-- 九宮格線金色漸層 -->
    <linearGradient id="gridGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8d080"/>
      <stop offset="50%"  stop-color="#c8a84a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>

    <!-- 外圈漸層 -->
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8d080"/>
      <stop offset="30%"  stop-color="#c8a84a"/>
      <stop offset="70%"  stop-color="#8a6020"/>
      <stop offset="100%" stop-color="#e8d080"/>
    </linearGradient>

    <!-- 太極陰陽漸層 -->
    <linearGradient id="yangGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0e0a0"/>
      <stop offset="100%" stop-color="#c8a84a"/>
    </linearGradient>
    <linearGradient id="yinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a35"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>

    <!-- 星芒漸層 -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff0a0"/>
      <stop offset="40%"  stop-color="#e8c850"/>
      <stop offset="100%" stop-color="#c8a84a" stop-opacity="0"/>
    </radialGradient>

    <!-- 三奇色 -->
    <linearGradient id="qiColor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8b830"/>
      <stop offset="100%" stop-color="#f0d060"/>
    </linearGradient>

    <!-- 紅色accent -->
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#d04040"/>
      <stop offset="100%" stop-color="#a02020"/>
    </linearGradient>

    <!-- 青色accent -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#20c8a0"/>
      <stop offset="100%" stop-color="#109070"/>
    </linearGradient>

    <!-- 外圈文字路徑 -->
    <path id="textCircle" d="M 256,256 m -175,0 a 175,175 0 1,1 350,0 a 175,175 0 1,1 -350,0" fill="none"/>

    <!-- 濾鏡：金色光暈 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 裁切圓形 -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="230"/>
    </clipPath>
    <clipPath id="innerClip">
      <circle cx="256" cy="256" r="160"/>
    </clipPath>

  </defs>

  <!-- ═══ 圓形背景 ═══ -->
  <circle cx="256" cy="256" r="256" fill="#07070f"/>
  <circle cx="256" cy="256" r="252" fill="url(#bgGrad)"/>

  <!-- 背景金色光暈 -->
  <circle cx="256" cy="256" r="220" fill="url(#goldGlow)"/>

  <!-- ═══ 外圈裝飾環（雙環） ═══ -->
  <!-- 最外裝飾環 -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#outerRing)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#outerRing)" stroke-width="0.6" opacity="0.4"/>

  <!-- 主外圈 -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="url(#outerRing)" stroke-width="2.5"/>

  <!-- 外圈刻度（24節氣，每15度一格） -->
  <g stroke="url(#gridGold)" stroke-linecap="round" opacity="0.7">
    <!-- 24等分刻度 -->
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(0   256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(15  256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(30  256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(45  256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(60  256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(75  256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(90  256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(105 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(120 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(135 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(150 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(165 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(180 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(195 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(210 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(225 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(240 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(255 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(270 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(285 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(300 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(315 256 256)" stroke-width="1"/>
    <line x1="256" y1="32"  x2="256" y2="44"  transform="rotate(330 256 256)" stroke-width="2"/>
    <line x1="256" y1="32"  x2="256" y2="40"  transform="rotate(345 256 256)" stroke-width="1"/>
  </g>

  <!-- 四正方位大菱形標記 -->
  <polygon points="256,38 261,48 256,58 251,48" fill="url(#gridGold)" opacity="0.9"/>
  <polygon points="256,38 261,48 256,58 251,48" fill="url(#gridGold)" opacity="0.9" transform="rotate(90  256 256)"/>
  <polygon points="256,38 261,48 256,58 251,48" fill="url(#gridGold)" opacity="0.9" transform="rotate(180 256 256)"/>
  <polygon points="256,38 261,48 256,58 251,48" fill="url(#gridGold)" opacity="0.9" transform="rotate(270 256 256)"/>

  <!-- ═══ 八卦方位文字 ═══ -->
  <g font-family="'Noto Serif TC', serif" font-size="16" fill="url(#gridGold)" text-anchor="middle" dominant-baseline="middle" opacity="0.85" filter="url(#innerGlow)">
    <!-- 坎北 -->
    <text x="256" y="72">坎</text>
    <!-- 離南 -->
    <text x="256" y="442">離</text>
    <!-- 震東 -->
    <text x="442" y="260">震</text>
    <!-- 兌西 -->
    <text x="72"  y="260">兌</text>
    <!-- 艮東北 -->
    <text x="378" y="135">艮</text>
    <!-- 坤西南 -->
    <text x="135" y="378">坤</text>
    <!-- 巽東南 -->
    <text x="378" y="378">巽</text>
    <!-- 乾西北 -->
    <text x="135" y="135">乾</text>
  </g>

  <!-- ═══ 中層：八卦爻象環 ═══ -->
  <!-- 乾 ☰ 西北 (315°) -->
  <g transform="rotate(-45 256 256) translate(0 -178)" opacity="0.75">
    <g transform="translate(256 256)">
      <rect x="-14" y="-10" width="28" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="-14" y="-3"  width="28" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="-14" y="4"   width="28" height="4" rx="2" fill="url(#gridGold)"/>
    </g>
  </g>
  <!-- 坤 ☷ 西南 (225°) -->
  <g transform="rotate(45 256 256) translate(0 178)" opacity="0.75">
    <g transform="translate(256 256) rotate(180)">
      <rect x="-14" y="-10" width="12" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="2"   y="-10" width="12" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="-14" y="-3"  width="12" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="2"   y="-3"  width="12" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="-14" y="4"   width="12" height="4" rx="2" fill="url(#gridGold)"/>
      <rect x="2"   y="4"   width="12" height="4" rx="2" fill="url(#gridGold)"/>
    </g>
  </g>

  <!-- ═══ 第二環：八方射線 ═══ -->
  <g stroke="url(#gridGold)" stroke-width="0.8" opacity="0.3">
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(0   256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(45  256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(90  256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(135 256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(180 256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(225 256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(270 256 256)"/>
    <line x1="256" y1="84" x2="256" y2="172" transform="rotate(315 256 256)"/>
  </g>

  <!-- 中環線 -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="url(#outerRing)" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══ 九宮格（核心） ═══ -->
  <!-- 九宮背景圓 -->
  <circle cx="256" cy="256" r="128" fill="#0d0d1e" opacity="0.95"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="url(#gridGold)" stroke-width="2"/>

  <!-- 九宮格線 -->
  <g stroke="url(#gridGold)" stroke-width="1.5" opacity="0.8" clip-path="url(#innerClip)">
    <!-- 橫線 -->
    <line x1="128" y1="213" x2="384" y2="213"/>
    <line x1="128" y1="299" x2="384" y2="299"/>
    <!-- 縱線 -->
    <line x1="213" y1="128" x2="213" y2="384"/>
    <line x1="299" y1="128" x2="299" y2="384"/>
  </g>

  <!-- 九宮數字（洛書）：4 9 2 / 3 5 7 / 8 1 6 -->
  <!-- 亮度依照洛書吉凶：9最亮，5中，其餘均勻 -->
  <g font-family="serif" font-size="15" fill="url(#gridGold)" text-anchor="middle" dominant-baseline="middle" opacity="0.5">
    <!-- Row 1: 巽4  離9  坤2 -->
    <text x="171" y="171">四</text>
    <text x="256" y="171">九</text>
    <text x="341" y="171">二</text>
    <!-- Row 2: 震3  中5  兌7 -->
    <text x="171" y="256">三</text>
    <text x="256" y="256">五</text>
    <text x="341" y="256">七</text>
    <!-- Row 3: 艮8  坎1  乾6 -->
    <text x="171" y="341">八</text>
    <text x="256" y="341">一</text>
    <text x="341" y="341">六</text>
  </g>

  <!-- 值符宮（1宮坎位）高亮 -->
  <rect x="213" y="299" width="86" height="86" fill="url(#gridGold)" opacity="0.06" clip-path="url(#innerClip)"/>
  <rect x="213" y="213" width="86" height="86" fill="url(#tealAccent)" opacity="0.06" clip-path="url(#innerClip)"/>

  <!-- ═══ 太極符號（中心） ═══ -->
  <!-- 中心圓底色 -->
  <circle cx="256" cy="256" r="50" fill="#0d0d1e"/>

  <!-- 太極大圓 -->
  <circle cx="256" cy="256" r="46" fill="url(#yangGrad)" filter="url(#innerGlow)"/>

  <!-- 陰半部 -->
  <path d="M 256,210 A 46,46 0 0,0 256,302 A 23,23 0 0,1 256,256 A 23,23 0 0,0 256,210 Z"
        fill="url(#yinGrad)"/>

  <!-- 陽小圓（上） -->
  <circle cx="256" cy="233" r="11" fill="url(#yangGrad)"/>
  <!-- 陰小圓（下） -->
  <circle cx="256" cy="279" r="11" fill="url(#yinGrad)"/>

  <!-- 陽小點 -->
  <circle cx="256" cy="233" r="4" fill="url(#yinGrad)" opacity="0.9"/>
  <!-- 陰小點 -->
  <circle cx="256" cy="279" r="4" fill="url(#yangGrad)" opacity="0.9"/>

  <!-- 太極外框 -->
  <circle cx="256" cy="256" r="46" fill="none" stroke="url(#gridGold)" stroke-width="1.5"/>

  <!-- ═══ 三奇符號（丁丙乙）環繞太極 ═══ -->
  <!-- 三個金色小星點，對應三奇 -->
  <g filter="url(#glow)">
    <!-- 丙（正上，離宮） -->
    <circle cx="256" cy="196" r="5" fill="url(#qiColor)"/>
    <circle cx="256" cy="196" r="8" fill="none" stroke="url(#qiColor)" stroke-width="0.8" opacity="0.5"/>
    <!-- 丁（左下，兌宮方向） -->
    <circle cx="210" cy="283" r="5" fill="url(#qiColor)"/>
    <circle cx="210" cy="283" r="8" fill="none" stroke="url(#qiColor)" stroke-width="0.8" opacity="0.5"/>
    <!-- 乙（右下，震宮方向） -->
    <circle cx="302" cy="283" r="5" fill="url(#qiColor)"/>
    <circle cx="302" cy="283" r="8" fill="none" stroke="url(#qiColor)" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- 三奇連線（等邊三角形） -->
  <polygon points="256,196 210,283 302,283"
           fill="none" stroke="url(#qiColor)" stroke-width="0.8"
           stroke-dasharray="4,3" opacity="0.45"/>

  <!-- ═══ 四正方位星芒 ═══ -->
  <!-- 正北（坎） -->
  <polygon points="256,144 259,155 256,166 253,155"
           fill="url(#starGlow)" opacity="0.7" filter="url(#innerGlow)"/>
  <!-- 正南（離） -->
  <polygon points="256,346 259,357 256,368 253,357"
           fill="url(#starGlow)" opacity="0.7" filter="url(#innerGlow)"/>
  <!-- 正東（震） -->
  <polygon points="346,256 357,259 368,256 357,253"
           fill="url(#starGlow)" opacity="0.7" filter="url(#innerGlow)"/>
  <!-- 正西（兌） -->
  <polygon points="144,256 155,259 166,256 155,253"
           fill="url(#starGlow)" opacity="0.7" filter="url(#innerGlow)"/>

  <!-- ═══ 八門符號（小圓點標記） ═══ -->
  <g fill="url(#tealAccent)" opacity="0.6">
    <!-- 坎1 休門 -->
    <circle cx="256" cy="324" r="3"/>
    <!-- 坤2 死門 -->
    <circle cx="312" cy="312" r="3"/>
    <!-- 震3 傷門 -->
    <circle cx="324" cy="256" r="3"/>
    <!-- 巽4 杜門 -->
    <circle cx="312" cy="200" r="3"/>
    <!-- 乾6 開門 -->
    <circle cx="200" cy="200" r="3"/>
    <!-- 兌7 驚門 -->
    <circle cx="188" cy="256" r="3"/>
    <!-- 艮8 生門 -->
    <circle cx="200" cy="312" r="3"/>
    <!-- 離9 景門 -->
    <circle cx="256" cy="188" r="3"/>
  </g>

  <!-- ═══ 外圈文字裝飾 ═══ -->
  <!-- 頂部品牌文字 -->
  <text font-family="'Noto Serif TC', 'Ma Shan Zheng', serif" font-size="13"
        fill="url(#gridGold)" text-anchor="middle" opacity="0.75" letter-spacing="3">
    <textPath href="#textCircle" startOffset="12%">奇　門　遁　甲　時　家</textPath>
  </text>
  <text font-family="'Noto Serif TC', serif" font-size="10"
        fill="url(#gridGold)" text-anchor="middle" opacity="0.5" letter-spacing="2">
    <textPath href="#textCircle" startOffset="62%">九　宮　八　卦　六　儀　三　奇</textPath>
  </text>

  <!-- ═══ 最外邊框 ═══ -->
  <circle cx="256" cy="256" r="254" fill="none" stroke="url(#outerRing)" stroke-width="1" opacity="0.4"/>

  <!-- ═══ 頂部星光點綴 ═══ -->
  <g filter="url(#softGlow)" opacity="0.6">
    <circle cx="256" cy="40" r="2.5" fill="#e8d080"/>
    <circle cx="256" cy="472" r="2.5" fill="#e8d080"/>
    <circle cx="40"  cy="256" r="2.5" fill="#e8d080"/>
    <circle cx="472" cy="256" r="2.5" fill="#e8d080"/>
  </g>

</svg>
